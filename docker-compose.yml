services:
  database:
    image: postgres:17-alpine
    container_name: data-users
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: redis-session
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5


  s3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-storage
    volumes:
      - minio-data:/var/lib/minio/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /var/lib/minio/data --console-address ":9001"
    environment:
      - MINIO_ENDPOINT=${MINIO_ROOT_USER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5


  frontend:
    container_name: nginx-frontend
    build:
      context: ./frontend
    ports:
      - "3030:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3


networks:
  app-network:
    driver: bridge


volumes:
  postgres-data:
  minio-data:
  redis-data:
